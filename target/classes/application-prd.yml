# Production Environment Configuration
# 此文件仅在 spring.profiles.active=prd 时加载
# 生产环境启动: java -jar app.jar -Dspring.profiles.active=prd

server:
  port: 8099
  # 生产环境优化参数
  servlet:
    session:
      timeout: 60m
  # 生产环境连接池配置
  tomcat:
    threads:
      max: 200
      min-spare: 20
    max-connections: 10000
    accept-count: 100

spring:
  # 生产环境数据库配置（通过环境变量注入）
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境禁止自动修改数据库
    show-sql: false       # 生产环境不输出SQL
    properties:
      hibernate:
        format_sql: false
  
  # 生产环境Cloud配置
  cloud:
    nacos:
      discovery:
        # 生产环境Nacos地址（通过环境变量注入）
        server-addr: ${NACOS_SERVER_ADDR}
        username: ${NACOS_USERNAME}
        password: ${NACOS_PASSWORD}
        # 生产环境使用独立命名空间
        namespace: prd
        group: PROD_GROUP
        register-enabled: true
      # 配置中心启用
      config:
        server-addr: ${NACOS_SERVER_ADDR}
        namespace: prd
        group: PROD_GROUP
        file-extension: yml
        refresh-enabled: true
    
    # OpenFeign 生产配置
    openfeign:
      autoconfiguration:
        jackson:
          enabled: false
  
  # 生产环境连接池
  mvc:
    throw-exception-if-no-handler-found: false

# 生产环境RocketMQ配置
rocketmq:
  config:
    # 生产环境使用多个NameServer地址保证高可用
    namesrvAddrs:
      - 110.40.135.216:9876
    #      - 110.40.135.217:9876
    #      - 110.40.135.218:9876
    
    # 生产环境配置
    isVIPChannel: true
    timeoutMillis: 10000  # 生产环境增加超时时间
    dataPath: /data/mq-console/prd
    enableDashBoardCollect: true
    msgTrackTopicName:
    ticketKey: ticket
    # 生产环境必须启用登录
    loginRequired: true
    # 生产环境启用TLS
    useTLS: true
    # 生产环境ACL配置（从环境变量读取）
    accessKey: ${ROCKETMQ_ACCESS_KEY}
    secretKey: ${ROCKETMQ_SECRET_KEY}

# 生产环境线程池配置（更大的容量）
thread-pool:
  config:
    coreSize: 20
    maxSize: 50
    keepAliveTime: 5000
    queueSize: 10000

# 生产环境日志配置
logging:
  level:
    root: WARN
    com.old.silence.mq.center: INFO
    org.springframework: WARN
    org.springframework.cloud: WARN
    com.alibaba.nacos: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%15thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%15thread] %-5level %logger{36} [%class{0}.%method:%line] - %msg%n"
  file:
    name: /data/logs/mq-console/mq-console.log
    max-size: 100MB
    max-history: 30
    total-size-cap: 10GB
  logback:
    rollingpolicy:
      file-name-pattern: /data/logs/mq-console/mq-console-%d{yyyy-MM-dd}-%i.log.gz

# Actuator 端点配置（生产环境只暴露必要端点）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# 生产环境应用配置
platform:
  system:
    env: prd
    identifier: MC-PRD

# 生产环境安全配置（严格）
silence:
  auth:
    center:
      security:
        api:
          white-list:

# 生产环境禁用Swagger文档
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

# 生产环境缓存配置
cache:
  default-ttl: 3600
  max-entries: 10000